name: Host2Play Auto Renew gost

on:
  workflow_dispatch:
  schedule:
    # 每天 0:00 / 8:00 / 16:00 UTC，间隔约 8 小时
    - cron: "21 5,11,17,23 * * *"

permissions:
  contents: write 
  actions: write

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout private repo (Host2Play)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Host2Play-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full

      - name: Start the GOST proxy forwarding
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org \
            | sed 's/\([0-9]*\.[0-9]*\.[0-9]*\.\)[0-9]*/\1**/g'

      - name: Install Node dependencies
        working-directory: scripts
        run: |
          npm init -y
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install --with-deps chromium

      - name: Download Buster extension
        working-directory: scripts
        run: |
          mkdir -p extensions/buster
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/dessant/buster/releases/latest || echo "")
          ZIP_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith("-chrome.zip")) | .browser_download_url' || echo "")
          
          if [ -z "$ZIP_URL" ] || [ "$ZIP_URL" == "null" ]; then
            echo "⚠️ 获取最新版本失败，使用预设回退版本"
            ZIP_URL="https://github.com/dessant/buster/releases/download/v3.1.1/buster_captcha_solver_for_humans-3.1.1-chrome.zip"
          fi
          
          echo "📥 下载地址: $ZIP_URL"
          wget -O extensions/buster/buster.zip "$ZIP_URL"

      - name: Unpack Buster extension
        working-directory: scripts
        run: |
          mkdir -p extensions/buster/unpacked
          unzip -o extensions/buster/buster.zip -d extensions/buster/unpacked
          echo "📌 manifest.json:"
          cat extensions/buster/unpacked/manifest.json

      - name: Run renew script
        working-directory: scripts
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          USE_LOCAL_PROXY: ${{ secrets.GOST_PROXY != '' && 'true' || 'false' }}
        run: |
          mkdir -p screenshots
          xvfb-run -a stdbuf -oL -eL node renew_gost.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          if-no-files-found: warn
          compression-level: 6

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
