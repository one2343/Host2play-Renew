name: Auto Renew Server Warp

on:
  workflow_dispatch:
  schedule:
    # 每天 0:00 / 8:00 / 16:00 UTC，间隔约 8 小时
    - cron: "21 5,11,17,23 * * *"

permissions:
  contents: write 
  actions: write

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout private repo (Host2Play)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Host2Play-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🌐 设置 WARP 出口
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: Install system dependencies & Chrome
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl jq p7zip-full
          
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage requests SpeechRecognition pydub

      - name: Run Python renew script
        working-directory: scripts
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python -u renew_warp.py

      - name: Upload Error Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-reports
          path: |
            scripts/*.html
            scripts/*.jpg
          if-no-files-found: ignore
          compression-level: 6

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
