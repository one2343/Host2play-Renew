name: Host2Play Auto Renew buster

on:
  workflow_dispatch:
  schedule:
    # 每天 0:00 / 8:00 / 16:00 UTC，间隔约 8 小时，接近 7.5 小时
    - cron: "21 5,11,17,23 * * *"

permissions:
  contents: write # 👈 注意：清理历史运行记录需要 write 权限
  actions: write  # 👈 必须添加 actions 读写权限

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================
      # 📥 检出
      # =========================
      - name: Checkout private repo (Host2Play)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Host2Play-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      # =========================
      # ⚡️ Node.js
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 📦 系统依赖
      # =========================
      - name: Install system dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full

      # =========================
      # 📦 Node 依赖 + Playwright Chromium
      # =========================
      - name: Install Node dependencies
        working-directory: scripts
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      # =========================
      # 📦 下载扩展 (Buster)
      # =========================
      - name: Download Buster extension
        working-directory: scripts
        run: |
          mkdir -p extensions/buster
          # 动态获取 Github Release 的最新 chrome.zip 版本，失败则回退到指定版本
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/dessant/buster/releases/latest || echo "")
          ZIP_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith("-chrome.zip")) | .browser_download_url' || echo "")
          
          if [ -z "$ZIP_URL" ] || [ "$ZIP_URL" == "null" ]; then
            echo "⚠️ 获取最新版本失败，使用预设回退版本"
            ZIP_URL="https://github.com/dessant/buster/releases/download/v3.1.1/buster_captcha_solver_for_humans-3.1.1-chrome.zip"
          fi
          
          echo "📥 下载地址: $ZIP_URL"
          wget -O extensions/buster/buster.zip "$ZIP_URL"

      - name: Unpack Buster extension
        working-directory: scripts
        run: |
          mkdir -p extensions/buster/unpacked
          unzip -o extensions/buster/buster.zip -d extensions/buster/unpacked
          echo "📌 manifest.json:"
          cat extensions/buster/unpacked/manifest.json

      # =========================
      # 🚀 执行续费脚本
      # =========================
      - name: Run renew script
        working-directory: scripts
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          mkdir -p screenshots
          xvfb-run -a node renew_buster.js

      # =========================
      # 📤 上传截图
      # =========================
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          if-no-files-found: warn
          compression-level: 6

      # =========================
      # 🧹 清理旧运行记录 (保留最近3次)
      # =========================
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0        # 设置保留天数为0，强制按运行次数清理
          keep_minimum_runs: 3  # 只保留最近 3 次运行
