name: Host2Play Auto Renew buster

on:
  workflow_dispatch:
  schedule:
    # 每天 0:00 / 6:00 / 12:00 / 18:00 UTC
    - cron: "21 5,11,17,23 * * *"

permissions:
  contents: write 
  actions: write

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout private repo (Host2Play)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Host2Play-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: scripts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          # 核心修复：安装 expect 以获取 unbuffer 命令
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full expect

      - name: Setup Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual # 开启 IPv4 和 IPv6 支持

      - name: Install Node dependencies
        working-directory: scripts
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Download Buster extension
        working-directory: scripts
        run: |
          mkdir -p extensions/buster
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/dessant/buster/releases/latest || echo "")
          ZIP_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | endswith("-chrome.zip")) | .browser_download_url' || echo "")
          
          if [ -z "$ZIP_URL" ] || [ "$ZIP_URL" == "null" ]; then
            echo "⚠️ 获取最新版本失败，使用预设回退版本"
            ZIP_URL="https://github.com/dessant/buster/releases/download/v3.1.1/buster_captcha_solver_for_humans-3.1.1-chrome.zip"
          fi
          
          echo "📥 下载地址: $ZIP_URL"
          wget -O extensions/buster/buster.zip "$ZIP_URL"

      - name: Unpack Buster extension
        working-directory: scripts
        run: |
          mkdir -p extensions/buster/unpacked
          unzip -o extensions/buster/buster.zip -d extensions/buster/unpacked
          echo "📌 manifest.json:"
          cat extensions/buster/unpacked/manifest.json

      - name: Run renew script
        working-directory: scripts
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          FORCE_COLOR: 1 # 欺骗 Node.js 开启彩色日志输出
          DEBUG: pw:api  # 开启 Playwright 底层动作日志，方便排查卡在哪一步
        run: |
          mkdir -p screenshots
          unbuffer xvfb-run -a node renew_buster.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          if-no-files-found: warn
          compression-level: 6

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
